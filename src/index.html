<html>
    <head>
        <title>Snake Game</title>
        <link rel="stylesheet" href="index.css">
        <script>
            // Load Vercel Insights only after user consent
            function loadVercelInsights() {
                const script = document.createElement('script');
                script.defer = true;
                script.src = 'https://cdn.vercel-insights.com/v1/script.js';
                document.head.appendChild(script);
            }

            // Check for user consent and load analytics if granted
            function checkConsentAndLoadAnalytics() {
                // Check localStorage for consent (you can also check cookies if preferred)
                const hasConsent = localStorage.getItem('analyticsConsent') === 'true';

                if (hasConsent) {
                    loadVercelInsights();
                }
            }

            // Run consent check when DOM is ready
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', checkConsentAndLoadAnalytics);
            } else {
                checkConsentAndLoadAnalytics();
            }
        </script>
    </head>
    <body>
        <div class="navbar">
            <div class="left_navbar">
                <span class="logo_text">Lets Snake!!</span>
                <div class="left_btn">
                    <button class="home_btn">Home</button>
                    <button class="home_btn">Rules</button>
                    <button class="home_btn">About us</button>
                </div>
            </div>
            <div class="right_navbar">
                <button class="Profile">Stats</button>
                
                <button class="Profile">Profile</button>
            </div>     
        </div>
        
        <div class="grid_outer">
            <canvas id="gameCanvas" class="grid_inner" width="500" height="500"></canvas>
        </div>
        
        <script src="bundle.js"></script>
    </body>
</html>
